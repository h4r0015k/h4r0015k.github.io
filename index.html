<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins&family=Roboto:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* http://meyerweb.com/eric/tools/css/reset/ 
        v2.0 | 20110126
        License: none (public domain)
      */

      html,
      body,
      div,
      span,
      applet,
      object,
      iframe,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      blockquote,
      pre,
      a,
      abbr,
      acronym,
      address,
      big,
      cite,
      code,
      del,
      dfn,
      em,
      img,
      ins,
      kbd,
      q,
      s,
      samp,
      small,
      strike,
      strong,
      sub,
      sup,
      tt,
      var,
      b,
      u,
      i,
      center,
      dl,
      dt,
      dd,
      ol,
      ul,
      li,
      fieldset,
      form,
      label,
      legend,
      table,
      caption,
      tbody,
      tfoot,
      thead,
      tr,
      th,
      td,
      article,
      aside,
      canvas,
      details,
      embed,
      figure,
      figcaption,
      footer,
      header,
      hgroup,
      menu,
      nav,
      output,
      ruby,
      section,
      summary,
      time,
      mark,
      audio,
      video {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 100%;
        font: inherit;
        vertical-align: baseline;
      }
      /* HTML5 display-role reset for older browsers */
      article,
      aside,
      details,
      figcaption,
      figure,
      footer,
      header,
      hgroup,
      menu,
      nav,
      section {
        display: block;
      }
      body {
        line-height: 1;
      }
      ol,
      ul {
        list-style: none;
      }
      blockquote,
      q {
        quotes: none;
      }
      blockquote:before,
      blockquote:after,
      q:before,
      q:after {
        content: "";
        content: none;
      }
      table {
        border-collapse: collapse;
        border-spacing: 0;
      }

      .wrapper {
        max-width: 1000px;
        margin: 0 auto;
        font-family: "Roboto";
      }

      .basicInfoCard .title {
        font-size: 2.2em;
        margin-top: 30px;
        margin-left: 1px;
        color: #004d40;
        font-family: "Poppins";
      }

      .basicInfoCard .title::after {
        content: "Software Engineer";
        display: block;
        font-size: 0.4em;
        color: #6e7b75;
        font-family: "Lato";
      }

      .basicInfoCard {
        background: linear-gradient(135deg, #b2beb5, #d1d8d5);
        border-radius: 12px;
        display: flex;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        margin-top: 40px;
        padding: 30px 30px;
        gap: 10px;
      }

      .profilePic {
        height: 160px;
        display: block;
        border-radius: 10px;
        border-color: #d3d3d3;
        filter: grayscale(1);
        margin: 0 auto;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      }

      .desc {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .desc span {
        display: inline-flex;
        font-size: 1.4em;
        text-align: left;
        color: #444444;
        line-height: 1.6;
        font-family: "Work Sans";
        margin-left: 20px;
      }

      .socials {
        font-size: 1.3em;
        display: flex;
        gap: 20px;
        flex-direction: row-reverse;
        color: #595959;
      }
      .socials li:nth-child(1) {
        color: #595959;
      }
      .socials li:nth-child(2) {
        color: #548E8E;
      }
      .socials li:nth-child(3) {
        color: #3B8060;
      }

      .socials a:hover {
        text-decoration: underline;
        cursor: pointer;
        color: #000;
      }
      
      .personalDetails {
        flex-shrink: 0;
      }

      @media all and (max-width: 600px) {
        .wrapper {
          padding: 5px;
        }
        .basicInfoCard .title {
          font-size: 2.5em;
          margin-top: 15px;
          text-align: center;
        }
        .basicInfoCard {
          flex-direction: column;
          align-items: center;
          margin: 10px 8px;
        }
        .profilePic {
          height: 260px;
        }

        .desc span {
          margin-top: 20px;
          margin-left: -10px;
          text-align: center;
          font-size: 1.2em;
          margin-bottom: 20px;
        }
        .socials {
          margin: 0 auto;
          font-size: 1em;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <section class="basicInfoCard">
        <div class="personalDetails">
          <img class="profilePic" src="./profile.png" alt="profile picture" />
          <h1 class="title">Nikhil Sahani</h1>
        </div>
        <div class="desc">
          <span>
            I’m a software engineer with 5+ years of experience specializing in
            backend development, modern web frameworks, and scalable systems. I
            love solving challenging problems and building impactful,
            high-performance software.
          </span>
          <ul class="socials">
            <li><a>Hire</a></li>
            <li><a>Linkedin</a></li>
            <li><a>Github</a></li>
          </ul>
        </div>
      </section>
    </div>
  </body>
</html>
